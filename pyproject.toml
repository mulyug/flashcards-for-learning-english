[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "W"]
ignore = [
    "B008",   # FastAPI uses Depends() in function signatures by design
    "UP042",  # StrEnum not available as drop-in for str+Enum in all contexts
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
