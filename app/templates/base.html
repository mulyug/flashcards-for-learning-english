<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Flashcards{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#7C3AED', dark: '#6D28D9', light: '#EDE9FE' },
            hard: '#EF4444',
            medium: '#F59E0B',
            easy: '#10B981',
            ink: '#1E1B2E',
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    body { background: linear-gradient(180deg, #FAFAF9 0%, #F5F3FF 100%); }
    .card-shadow { box-shadow: 0 1px 3px rgba(30,27,46,.04), 0 8px 24px rgba(124,58,237,.08); }
    .grade-btn { transition: transform .12s ease, box-shadow .12s ease; }
    .grade-btn:hover { transform: translateY(-2px); }
    .grade-btn:active { transform: translateY(0); }
  </style>
</head>
<body class="font-sans text-ink antialiased min-h-screen flex flex-col">
  {% block nav %}
    {% if current_user %}
    <nav class="bg-white/70 backdrop-blur border-b border-slate-200">
      <div class="max-w-4xl mx-auto px-4 h-14 flex items-center justify-between">
        <a href="/cards" class="flex items-center gap-2 font-semibold text-lg">
          <span class="inline-block w-2.5 h-2.5 rounded-full bg-brand"></span>
          Flashcards
        </a>
        <div class="flex items-center gap-1">
          <a href="/cards"
             class="px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-brand-light hover:text-brand-dark transition">
            Cards
          </a>
          <a href="/review"
             class="px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-brand-light hover:text-brand-dark transition">
            Review
          </a>
          <form method="post" action="/logout" class="inline">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button type="submit"
                    class="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-500 hover:text-slate-900 transition">
              Log out
            </button>
          </form>
        </div>
      </div>
    </nav>
    {% endif %}
  {% endblock %}
  <main class="max-w-4xl mx-auto px-4 py-8 w-full">
    {% block content %}{% endblock %}
  </main>
  <footer class="mt-auto border-t border-slate-200/60 bg-white/40">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between text-xs text-slate-400">
      <span>Built by <span class="text-slate-600 font-medium">mulyukov</span></span>
      <div class="flex items-center gap-4">
        <a href="https://github.com/mulyug/flashcards-for-learning-english"
           target="_blank" rel="noopener noreferrer"
           class="hover:text-slate-700 transition flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
          </svg>
          GitHub
        </a>
        <a href="https://t.me/mulyug"
           target="_blank" rel="noopener noreferrer"
           class="hover:text-slate-700 transition flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
          </svg>
          @mulyug
        </a>
      </div>
    </div>
  </footer>
  <script>
    (function () {
      var token = {{ (csrf_token if csrf_token is defined else '') | tojson }};
      if (!token) {
        var m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/);
        token = m ? decodeURIComponent(m[1]) : '';
      }
      if (token) {
        document.addEventListener('htmx:configRequest', function (e) {
          e.detail.headers['X-CSRF-Token'] = token;
        });
      }

      document.body.addEventListener('click', function (e) {
        var btn = e.target.closest('[data-reveal]');
        if (!btn) return;
        var card = btn.closest('[data-review-card]');
        if (!card) return;
        var trans = card.querySelector('[data-translation]');
        var grade = card.querySelector('[data-grade]');
        if (trans) trans.classList.remove('hidden');
        if (grade) {
          grade.classList.remove('hidden');
          grade.classList.add('flex');
        }
        btn.classList.add('hidden');
      });
    })();
  </script>
</body>
</html>
