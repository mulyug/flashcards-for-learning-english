<div data-review-card>
  <div class="text-xs uppercase tracking-wider text-slate-400 mb-4 text-center">
    {{ remaining }} card{{ '' if remaining == 1 else 's' }} remaining
  </div>

  <div data-flip class="flip-scene cursor-pointer select-none mb-6">
    <div class="flip-card">
      <div class="flip-face bg-white rounded-2xl card-shadow p-8 min-h-[20rem] flex flex-col items-center justify-center text-center">
        <div class="text-5xl md:text-6xl font-bold text-ink mb-6 break-words leading-tight">
          {{ card.english }}
        </div>
        {% if card.example %}
        <div class="text-slate-500 italic text-base max-w-md">
          "{{ card.example }}"
        </div>
        {% endif %}
        <div class="mt-6 text-xs uppercase tracking-wider text-slate-300">
          Tap to flip
        </div>
      </div>

      <div class="flip-face flip-face-back bg-white rounded-2xl card-shadow p-8 min-h-[20rem] flex flex-col items-center justify-center text-center">
        <div class="text-4xl md:text-5xl font-medium text-brand break-words leading-tight">
          {{ card.translation }}
        </div>
        <div class="mt-6 text-xs uppercase tracking-wider text-slate-300">
          Tap to flip back
        </div>
      </div>
    </div>
  </div>

  <div data-no-flip class="flex gap-3 sm:flex-row flex-col">
    <button hx-post="/review/{{ card.id }}/grade"
            hx-vals='{"grade":"hard"}'
            hx-target="#review-area"
            hx-swap="innerHTML"
            class="grade-btn flex-1 px-6 py-4 rounded-xl bg-hard hover:brightness-110 text-white font-semibold card-shadow">
      Hard
    </button>
    <button hx-post="/review/{{ card.id }}/grade"
            hx-vals='{"grade":"medium"}'
            hx-target="#review-area"
            hx-swap="innerHTML"
            class="grade-btn flex-1 px-6 py-4 rounded-xl bg-medium hover:brightness-110 text-white font-semibold card-shadow">
      Medium
    </button>
    <button hx-post="/review/{{ card.id }}/grade"
            hx-vals='{"grade":"easy"}'
            hx-target="#review-area"
            hx-swap="innerHTML"
            class="grade-btn flex-1 px-6 py-4 rounded-xl bg-easy hover:brightness-110 text-white font-semibold card-shadow">
      Easy
    </button>
  </div>
</div>
