{% extends "base.html" %}
{% block title %}{{ submit_label }} · Flashcards{% endblock %}

{% block content %}
<a href="/cards" class="text-sm text-slate-500 hover:text-slate-900 mb-3 inline-flex items-center gap-1">
  <span>←</span> Back to cards
</a>

<div class="bg-white rounded-2xl card-shadow p-6 max-w-xl">
  <h1 class="text-xl font-semibold mb-5">{{ submit_label }}</h1>
  <form method="post" action="{{ action }}" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <label class="block">
      <span class="block text-sm font-medium text-slate-700 mb-1">English</span>
      <input name="english" type="text" required maxlength="255" autofocus
             value="{{ card.english if card else '' }}"
             class="w-full px-3 py-2 rounded-lg border border-slate-200 focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none transition">
    </label>

    <label class="block">
      <span class="block text-sm font-medium text-slate-700 mb-1">Translation</span>
      <input name="translation" type="text" required maxlength="255"
             value="{{ card.translation if card else '' }}"
             class="w-full px-3 py-2 rounded-lg border border-slate-200 focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none transition">
    </label>

    <label class="block">
      <span class="block text-sm font-medium text-slate-700 mb-1">
        Example <span class="text-slate-400 font-normal">(optional)</span>
      </span>
      <textarea name="example" rows="3" maxlength="2000"
                class="w-full px-3 py-2 rounded-lg border border-slate-200 focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none transition resize-none">{{ card.example if card else '' }}</textarea>
    </label>

    <div class="flex gap-2 pt-2">
      <button type="submit"
              class="px-5 py-2 rounded-lg bg-brand hover:bg-brand-dark text-white font-medium transition">
        {{ submit_label }}
      </button>
      <a href="/cards"
         class="px-5 py-2 rounded-lg border border-slate-200 hover:bg-slate-50 text-slate-700 font-medium transition">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
