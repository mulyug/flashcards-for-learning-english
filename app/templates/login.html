{% extends "base.html" %}
{% block title %}Sign in · Flashcards{% endblock %}
{% block nav %}{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-2xl card-shadow p-8">
    <div class="flex items-center gap-3 mb-6">
      <span class="w-9 h-9 rounded-xl bg-brand grid place-items-center text-white font-bold">F</span>
      <div>
        <h1 class="text-xl font-semibold leading-tight">Flashcards</h1>
        <p class="text-sm text-slate-500 leading-tight">Sign in to continue</p>
      </div>
    </div>

    {% if error %}
    <div class="mb-4 px-3 py-2 rounded-lg bg-red-50 text-red-700 text-sm border border-red-100">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <label class="block">
        <span class="block text-sm font-medium text-slate-700 mb-1">Username</span>
        <input name="username" type="text" autocomplete="username" required autofocus
               class="w-full px-3 py-2 rounded-lg border border-slate-200 focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none transition">
      </label>

      <label class="block">
        <span class="block text-sm font-medium text-slate-700 mb-1">Password</span>
        <input name="password" type="password" autocomplete="current-password" required
               class="w-full px-3 py-2 rounded-lg border border-slate-200 focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none transition">
      </label>

      <button type="submit"
              class="w-full py-2.5 rounded-lg bg-brand hover:bg-brand-dark text-white font-medium transition">
        Sign in
      </button>
    </form>
  </div>
</div>
{% endblock %}
